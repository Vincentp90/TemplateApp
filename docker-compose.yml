services:
  rabbitmq:
    image: rabbitmq:4.2-management
    restart: on-failure:3
    ports:
      - "15672:15672"  # Management UI

  db:
    image: postgres:18.1
    restart: on-failure:3
    shm_size: 128mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: example
    volumes:
      - db_data:/var/lib/postgresql

  adminer:
    image: adminer
    restart: on-failure:3
    ports:
      - 8080:8080

volumes:
  db_data:
