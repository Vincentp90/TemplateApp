<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Frontend calls WishlistApi, which writes to its own Postgres database, publishes events to RabbitMQ, and now calls SteamTracker's API directly for price data instead of reading its database. SteamTracker consumes wishlist events, calls the Steam API, and writes to its own Postgres database.</desc>
